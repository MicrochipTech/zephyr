description: Binding for the Microchip XEC DMA controller.

compatible: "microchip,xec-dmac"

include: dma-controller.yaml

properties:
    reg:
      required: true

    interrupts:
      required: true

    "#dma-cells":
      const: 1

dma-cells:
  - channel

