description: Microchip XEC I2Cv3 byte mode I2C driver I2C

compatible: "microchip,xec-i2c-v3"

include: base.yaml

properties:
  reg:
    required: true
    description: MMIO Base address register mapping.

  interrupts:
    required: true
    description: Hardware interrupt vector assignment.

  girqs:
    type: int
    required: true
    description: |
      Hardware GIRQ encoded interrupt routing. Each peripheral
      interrupt line is routed to a GIRQ bit in the XEC ECIA.
      The GIRQ result bits which are bitwise AND of GIRQ enable
      and status are routed to the peripheral's NVIC input.
      The value is the encoded GIRQ number and bit position
      for this peripheral instance.

  pcr-scr:
    type: int
    required: true
    description: |
      Each peripheral instance has sleep enable, clock required, and
      reset bits in the PCR block. The value is the encoded PCR register
      index and bit position for the peripheral instance.
