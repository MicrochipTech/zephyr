description: |
  Microchip XEC I2Cv3-NL virtual I2C Port routing mapping
  onto a physical multi-port hardware controller.

compatible: "microchip,xec-i2c-v3-nl-port"

# This property forces Zephyr to treat this virtual port node as an I2C master bus
include: i2c-controller.yaml

properties:
  controller:
    type: phandle
    required: true
    description: Phandle pointing to the underlying hardware I2C controller block.

  port:
    type: int
    required: true
    description: The physical channel/port index (e.g., 0 through 15) on the controller.

  default-port:
    type: boolean
    description: Optional flag signifying this is the boot/default physical channel routing.
