description: |
  Microchip XEC I2C/SMB controller v3 (MEC174x, MEC175x, MEC165xB, and newer).
  using the hardware network layer plus DMA.

  This node represents the physical I2C controller hardware. Zephyr applications
  do not bind here; they bind to child port nodes (microchip,xec-i2c-v3-port),
  which select which pin pair the controller drives.

  Live SCL/SDA state is read from the controller's Bit Bang Control register on
  v3.8+ hardware, so no sda-gpios/scl-gpios are required.

compatible: "microchip,xec-i2c-v3-nl"

include: "microchip,dmec-ecia-girq.yaml"

properties:
  reg:
    required: true

  interrupts:
    required: true

  girqs:
    required: true

  pcr-scr:
    type: int
    required: true
    description: |
      Encoded PCR index and bit position used for peripheral sleep enable and
      reset. Build with MCHP_XEC_SCR_ENCODE(slp_idx, bitpos).

  dmas:
    required: true
    description: |
      DMA channels for the four endpoints, in this order:
      host-tx, host-rx, target-tx, target-rx.
      Each entry uses the XEC DMA controller's two-cell form:
      <&dmac CHANNEL SLOT>.

  dma-names:
    required: true
    description: |
      Must be the four strings "host-tx", "host-rx",
      "target-tx", "target-rx" in that order to match dmas.

  buffer-size:
    type: int
    default: 64
    description: |
      Size in bytes of the driver-owned DMA buffer. Shared across
      controller-TX, target-TX, and target-RX. Controller-TX messages
      larger than this are chunked across multiple DMA reloads from
      the DMA-channel callback; the Network-Layer engine runs the
      I2C side through the full length with no gap.
      Must be large enough to hold the target-RX worst case
      (address byte + expected max data + hardware trailing-zero).

  "#address-cells":
    const: 1

  "#size-cells":
    const: 0
