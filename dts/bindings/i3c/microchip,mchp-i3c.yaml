description: >
    This is a binding for the Microchip I3C interface

compatible: "microchip,mchp-i3c"

include:
  - name: i3c-controller.yaml
  - name: pinctrl-device.yaml
  - name: microchip,dmec-ecia-girq.yaml

properties:
  reg:
    required: true

  interrupts:
    required: true

  pcr-scr:
    type: int
    required: true
    description: |
      I3C Power Clock Reset(PCR) peripheral index and bit position

  port-sel:
    type: int
    description: soc block mapping to pin
    required: true

  pinctrl-0:
    type: phandles
    required: true

  pinctrl-names:
    type: string-array
    required: true

  input-clock-frequency:
    type: int
    required: true
    description: The controller input clock frequency

