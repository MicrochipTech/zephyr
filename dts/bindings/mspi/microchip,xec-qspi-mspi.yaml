description: Microchip XEC mulit-bit SPI using QSPI-LDMA

compatible: "microchip,xec-qspi-mspi"

include: ["mspi-controller.yaml", "pinctrl-device.yaml", "microchip,dmec-ecia-girq.yaml"]

properties:
  op-mode:
    default: "MSPI_OP_MODE_CONTROLLER"

  reg:
    required: true

  interrupts:
    required: true

  pinctrl-0:
    required: true

  pinctrl-names:
    required: true

  pcr-scr:
    type: int
    required: true
    description: |
      Integer encoding the PCR register index and bit position
      of this I2C controller.

  num-hw-ce:
    type: int
    required: true
    description: |
      Current QSPI controller hardware implements direct control of two
      chip enables. Software must select the chip enable and QSPI controls
      the assert/de-assertion based on timing parameters in the CS timing
      register. This property lets the application build the driver with
      support for 0, 1, or 2 HW controlled chip selects. The driver also
      supports GPIO pins as chip selects. Use the mspi-hardware-ce-num
      property in the flash child device node to indicate the flash device
      is connected to.

  dcsda:
    type: int
    description: |
      Delay in units of 10 ns from CS# de-assertion to CS# assertion.
      If not present use hardware default value of 6.

  ctrl-taps:
    type: array
    description: |
      An array of integers representing the control tap points for
      each of the two chip selects. Each value is in [0, 255]. 0 is HW default.
      This property may only be required for 96 MHz operation and is
      board layout dependent. Refer to the data sheet for control tap description.

  clock-taps:
    type: array
    description: |
      An array of integers representing the clock tap points for
      each of the two chip selects. Each value is in [0, 255]. 0 is HW default.
      This property may only be required for 96 MHz operation and is
      board layout dependent. Refer to data sheet for details.
