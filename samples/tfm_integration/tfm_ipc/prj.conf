CONFIG_BUILD_WITH_TFM=y
CONFIG_TFM_PROFILE_TYPE_NOT_SET=y
CONFIG_TFM_SFN=y
CONFIG_REBOOT=y

# The Zephyr CMSIS emulation assumes that ticks are ms, currently
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=4096

# MEC176x: Minimal TF-M for 128KB Code SRAM constraint
# Disable PSA Crypto to avoid selecting TFM_PARTITION_CRYPTO
CONFIG_PSA_CRYPTO=n

# Disable ALL partitions except NS_AGENT_TZ (built-in)
CONFIG_TFM_PARTITION_CRYPTO=n
CONFIG_TFM_PARTITION_INTERNAL_TRUSTED_STORAGE=n
CONFIG_TFM_PARTITION_PROTECTED_STORAGE=n
CONFIG_TFM_PARTITION_PLATFORM=n
CONFIG_TFM_PARTITION_INITIAL_ATTESTATION=n

# MEC176x: Disable arch HW init - TF-M already configured these
CONFIG_INIT_ARCH_HW_AT_BOOT=n
