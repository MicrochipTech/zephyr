sample:
  name: MEC5 I2C Network-Layer + MUX port-switch sample
  description: |
    Exercises the Microchip MEC5 I2C Network-Layer (DMA) controller and
    the companion per-port MUX driver. Two MUX child ports on different
    SCL/SDA pin pairs and different clock frequencies are alternated so
    the underlying controller is stopped, reset, pinctrl-reapplied, and
    reprogrammed between transfers.
tests:
  sample.drivers.i2c.mec5_mux_switch:
    tags:
      - i2c
      - drivers
    filter: dt_compat_enabled("microchip,mec5-i2c-mux")
    platform_allow:
      - mec_assy6941/mec1753/qlj
    harness: console
    harness_config:
      type: multi_line
      regex:
        - "mec5 mux switch sample"
        - "port 0 .* transfer"
        - "port 3 .* transfer"
