CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y
#CONFIG_LOG_MODE_MINIMAL=y
#CONFIG_LOG_MODE_DEFERRED=y
#CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_BACKEND_UART=y
#CONFIG_LOG_BACKEND_SWO=y
#CONFIG_LOG_BACKEND_SWO_REF_FREQ_HZ=96000000
#CONFIG_LOG_BACKEND_SWO_FREQ_HZ=4000000

CONFIG_GPIO=y
CONFIG_PINCTRL=y
CONFIG_LED=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
# CONFIG_UART_ASYNC_API=y

CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_DEVICE_RANDOM_GENERATOR=y
CONFIG_HARDWARE_DEVICE_CS_GENERATOR=y

# Drivers do not receive any calls from the kernel for
# PM changes. Drivers can block PM states by calling PM
# policy API. Driver must unblock PM state(s) when not
# active. Device contraints allows application to set
# PM states to be blocked in device tree.
CONFIG_PM=y
CONFIG_PM_POLICY_DEVICE_CONSTRAINTS=y

# Drivers receive PM entry/exit calls from the kernel to
# put device into and resume from low power states.
# CONFIG_PM_DEVICE=y

# Drivers initialize HW and keep it low power state
# except when application calls driver to perform an action.
# After action is performed driver puts device into low power state.
# CONFIG_PM_DEVICE_RUNTIME=y

# Help debug new code
# CONFIG_DEBUG_COREDUMP=y
# CONFIG_TRAP_UNALIGNED_ACCESS=y
# CONFIG_DEBUG=y
