# Test requires one of the GY271 sensor types selected — it probes for a
# sensor at the chosen address at run time. On the mec_assy6941 board no
# sensor is physically present, so the test's run-time probe will fail;
# what this config enables is build-time DT + driver verification.
CONFIG_SENSOR_GY271_HMC=y

# Exercise driver conditional-compile paths.
CONFIG_I2C_CALLBACK=y
CONFIG_I2C_TARGET=y
